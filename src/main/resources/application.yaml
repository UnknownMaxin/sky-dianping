server:
  port: 8081
spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  datasource:
    druid:
      driver-class-name: ${maxin.datasource.driver-class-name}
      url: jdbc:mysql://${maxin.datasource.host}:${maxin.datasource.port}/${maxin.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${maxin.datasource.username}
      password: ${maxin.datasource.password}
  data:
    redis:
      host: ${maxin.redis.host}
      port: ${maxin.redis.port}
      database: ${maxin.redis.database}
  ai:
    openai:
      base-url: ${maxin.ai.openai.base-url}
      api-key: ${maxin.ai.openai.api-key}
      chat:
        model: ${maxin.ai.openai.chat.model}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.maxin.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

mybatis-plus:
  type-aliases-package: com.maxin.entity # 别名扫描包

logging:
  level:
    com.maxin:
      mapper: debug
      service: info
      controller: info

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.maxin.controller